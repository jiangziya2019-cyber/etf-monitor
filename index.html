<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETF 投资监控系统</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);color:#fff;min-height:100vh;padding:20px}
.container{max-width:1400px;margin:0 auto}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 0;border-bottom:2px solid rgba(255,255,255,0.1);margin-bottom:30px}
h1{font-size:28px;background:linear-gradient(45deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
.metric-card{background:rgba(255,255,255,0.05);border-radius:15px;padding:25px;border:1px solid rgba(255,255,255,0.1)}
.metric-card h3{font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:10px}
.metric-value{font-size:32px;font-weight:700;margin-bottom:5px}
.profit-positive{color:#ff4757}
.profit-negative{color:#00ff88}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(400px,1fr));gap:20px;margin-bottom:30px}
.chart-card{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;border:1px solid rgba(255,255,255,0.1)}
.chart-card h3{font-size:18px;margin-bottom:15px;color:#00d2ff}
.chart-container{height:300px}
.holdings-section{background:rgba(255,255,255,0.05);border-radius:15px;padding:20px;border:1px solid rgba(255,255,255,0.1);margin-bottom:30px}
.holdings-section h3{font-size:18px;margin-bottom:15px;color:#00d2ff}
.holdings-table{width:100%;border-collapse:collapse}
.holdings-table th,.holdings-table td{padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1)}
.holdings-table th{color:rgba(255,255,255,0.6);font-weight:600}
.holdings-table tr:hover{background:rgba(0,210,255,0.1);cursor:pointer}
.update-time{text-align:center;color:rgba(255,255,255,0.5);font-size:12px;margin-top:20px}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center}
.modal.active{display:flex}
.modal-content{background:#1a1a2e;border-radius:20px;padding:30px;max-width:900px;width:90%;max-height:90vh;overflow-y:auto;border:1px solid rgba(0,210,255,0.3)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{color:#00d2ff;font-size:24px}
.modal-close{background:none;border:none;color:#fff;font-size:28px;cursor:pointer}
.modal-body{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.modal-chart{height:300px}
.time-range{display:flex;gap:10px;margin-bottom:15px}
.time-range button{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer}
.time-range button.active{background:#00d2ff;border-color:#00d2ff}
.stat-item{margin-bottom:10px}
.stat-label{color:rgba(255,255,255,0.6)}
.stat-value{color:#fff;font-size:18px}
@media(max-width:768px){.charts-grid,.metrics-grid{grid-template-columns:1fr}.modal-body{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<header><h1>📊 ETF 投资监控系统</h1></header>
<div class="metrics-grid">
<div class="metric-card"><h3>总市值</h3><div class="metric-value" id="totalValue">加载中...</div></div>
<div class="metric-card"><h3>总盈亏</h3><div class="metric-value" id="totalProfit">加载中...</div></div>
<div class="metric-card"><h3>收益率</h3><div class="metric-value" id="yieldRate">加载中...</div></div>
<div class="metric-card"><h3>持仓 ETF</h3><div class="metric-value" id="etfCount">加载中...</div></div>
</div>
<div class="charts-grid">
<div class="chart-card"><h3>📊 四层仓位分布</h3><div id="positionChart" class="chart-container"></div></div>
<div class="chart-card"><h3>💰 收益曲线 vs 沪深 300</h3><div id="returnsChart" class="chart-container"></div></div>
</div>
<div class="holdings-section">
<h3>📈 持仓明细 (点击查看详情) - 共<span id="totalETFs">0</span>只</h3>
<table class="holdings-table">
<thead><tr><th>名称</th><th>当前价</th><th>盈亏</th><th>盈亏%</th><th>市值</th></tr></thead>
<tbody id="holdingsTable"></tbody>
</table>
</div>
<div id="etfModal" class="modal">
<div class="modal-content">
<div class="modal-header">
<h2 id="modalTitle">📊 ETF 详情</h2>
<button class="modal-close" onclick="closeModal()">×</button>
</div>
<div class="modal-body">
<div>
<div class="time-range">
<button onclick="setTimeRange(7)" class="active">7 天</button>
<button onclick="setTimeRange(30)">30 天</button>
<button onclick="setTimeRange(90)">全部</button>
</div>
<div id="etfChart" class="modal-chart"></div>
</div>
<div id="etfStats"></div>
</div>
</div>
</div>
<div class="update-time">最后更新：<span id="lastUpdate">-</span></div>
</div>
<script>
let holdingsData=null,returnsData=null,holdingsHistory=null,currentETF=null,currentTimeRange=30,etfChartInstance=null;
async function loadData(){try{const[hR,rR,histR]=await Promise.all([fetch('holdings_current.json'),fetch('returns_history.json'),fetch('holdings_history.json')]);holdingsData=await hR.json();returnsData=await rR.json();holdingsHistory=await histR.json();console.log('数据加载:',holdingsData.etf_count,'只');updateUI();initCharts();}catch(e){console.error('加载失败:',e);loadSampleData();}}
function loadSampleData(){holdingsData={total_market_value:162796,total_profit:664,yield_rate:0.41,etf_count:19,etfs:[{name:'红利 ETF',price:3.284,profit:56,yield:0.46,market_value:12536},{name:'半导体',price:1.567,profit:-349,yield:-6.38,market_value:5134},{name:'储能电池',price:2.149,profit:508,yield:3.82,market_value:13832},{name:'黄金 9999',price:10.671,profit:-1816,yield:-11.86,market_value:13493},{name:'300ETF',price:4.592,profit:-274,yield:-2,market_value:13500}]};returnsData={records:[]};holdingsHistory={records:[]};updateUI();initCharts();}
function updateUI(){if(!holdingsData)return;document.getElementById('totalValue').textContent='¥'+Math.round(holdingsData.total_market_value).toLocaleString();const pE=document.getElementById('totalProfit');pE.textContent=(holdingsData.total_profit>=0?'+':'')+'¥'+Math.round(holdingsData.total_profit).toLocaleString();pE.className='metric-value '+(holdingsData.total_profit>=0?'profit-positive':'profit-negative');const yE=document.getElementById('yieldRate');yE.textContent=(holdingsData.yield_rate>=0?'+':'')+holdingsData.yield_rate.toFixed(2)+'%';yE.className='metric-value '+(holdingsData.yield_rate>=0?'profit-positive':'profit-negative');document.getElementById('etfCount').textContent=holdingsData.etf_count+'只';document.getElementById('totalETFs').textContent=holdingsData.etf_count;document.getElementById('lastUpdate').textContent=new Date().toLocaleString('zh-CN');document.getElementById('holdingsTable').innerHTML=holdingsData.etfs.map(e=>'<tr onclick="openModal(\''+e.name+'\')"><td>'+e.name+'</td><td>'+e.price+'</td><td class="'+(e.profit>=0?'profit-positive':'profit-negative')+'">'+(e.profit>=0?'+':'')+'¥'+Math.round(e.profit)+'</td><td class="'+(e.yield>=0?'profit-positive':'profit-negative')+'">'+(e.yield>=0?'+':'')+e.yield.toFixed(2)+'%</td><td>¥'+Math.round(e.market_value).toLocaleString()+'</td></tr>').join('');}
function initCharts(){const pc=echarts.init(document.getElementById('positionChart'));pc.setOption({tooltip:{trigger:'item'},series:[{type:'pie',radius:['40%','70%'],data:[{value:20,name:'防守层',itemStyle:{color:'#00d2ff'}},{value:39,name:'未来层',itemStyle:{color:'#3a7bd5'}},{value:13,name:'获利层',itemStyle:{color:'#00ff88'}},{value:14,name:'全球层',itemStyle:{color:'#ffa502'}},{value:14,name:'现金层',itemStyle:{color:'#ff4757'}}],label:{color:'#fff'}}]});if(returnsData&&returnsData.records&&returnsData.records.length>0){const rc=echarts.init(document.getElementById('returnsChart'));const dates=returnsData.records.map(r=>r.date.slice(5));const cumR=returnsData.records.map(r=>r.cumulative_return);const benchR=returnsData.records.map(r=>((r.benchmark_value-4000)/4000)*100);rc.setOption({tooltip:{trigger:'axis'},legend:{data:['我的收益','沪深 300'],textStyle:{color:'#fff'}},xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#fff'}}},yAxis:{type:'value',axisLine:{lineStyle:{color:'#fff'}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.1)'}}},series:[{name:'我的收益',type:'line',smooth:true,data:cumR,itemStyle:{color:'#00d2ff'},areaStyle:{color:'rgba(0,210,255,0.3)'}},{name:'沪深 300',type:'line',smooth:true,data:benchR,itemStyle:{color:'#ffa502'},areaStyle:{color:'rgba(255,165,2,0.2)'}}]});}}
function openModal(name){currentETF=name;document.getElementById('etfModal').classList.add('active');document.getElementById('modalTitle').textContent='📊 '+name+' 详情';updateETFChart();}
function closeModal(){document.getElementById('etfModal').classList.remove('active');}
function setTimeRange(days){currentTimeRange=days;document.querySelectorAll('.time-range button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');updateETFChart();}
function updateETFChart(){if(!holdingsHistory||!currentETF)return;let filtered=holdingsHistory.records;if(currentTimeRange===7)filtered=filtered.slice(-7);else if(currentTimeRange===30)filtered=filtered.slice(-30);const dates=filtered.map(r=>r.date.slice(5));const etfData=filtered.map(r=>{const e=r.etfs.find(x=>x.name===currentETF);return e?e.market_value/1000:0;});if(etfChartInstance)etfChartInstance.dispose();etfChartInstance=echarts.init(document.getElementById('etfChart'));etfChartInstance.setOption({tooltip:{trigger:'axis'},xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#fff'}}},yAxis:{type:'value',axisLine:{lineStyle:{color:'#00d2ff'}},splitLine:{lineStyle:{color:'rgba(255,255,255,0.1)'}}},series:[{type:'line',smooth:true,data:etfData,itemStyle:{color:'#00d2ff'},areaStyle:{color:'rgba(0,210,255,0.3)'}}]});const cur=holdingsData.etfs.find(e=>e.name===currentETF);if(cur){document.getElementById('etfStats').innerHTML='<h3 style="color:#00d2ff;margin-bottom:15px;">📊 持仓统计</h3><div class="stat-item"><span class="stat-label">当前价：</span><span class="stat-value">'+cur.price+'</span></div><div class="stat-item"><span class="stat-label">盈亏：</span><span class="'+(cur.profit>=0?'profit-positive':'profit-negative')+'">'+(cur.profit>=0?'+':'')+'¥'+Math.round(cur.profit)+'</span></div><div class="stat-item"><span class="stat-label">盈亏%：</span><span class="'+(cur.yield>=0?'profit-positive':'profit-negative')+'">'+(cur.yield>=0?'+':'')+cur.yield.toFixed(2)+'%</span></div><div class="stat-item"><span class="stat-label">市值：</span><span class="stat-value">¥'+Math.round(cur.market_value).toLocaleString()+'</span></div>';}}
loadData();
</script>
</body>
</html>
